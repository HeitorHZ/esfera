<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Esfera que muda de cor</title>
  
  <style>
    body {
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f1a;
      overflow: hidden;
    }

    .esfera {
      width: 220px;
      height: 220px;
      background: radial-gradient(
        circle at 30% 30%,
        #ffffff 0%,
        #ff3366 25%,
        #7b2cbf 50%,
        #00d4ff 75%,
        #000000 100%
      );
      border-radius: 50%;
      box-shadow: 
        inset 0 0 50px rgba(255,255,255,0.4),
        0 0 60px #ff3366,
        0 0 100px #7b2cbf,
        0 0 140px #00d4ff;
      cursor: pointer;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .esfera::before {
      content: "";
      position: absolute;
      width: 40%;
      height: 40%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), transparent 60%);
      border-radius: 50%;
      top: 15%;
      left: 20%;
      transform: rotate(-30deg);
      pointer-events: none;
    }

    .esfera:hover {
      transform: scale(1.08);
      box-shadow: 
        inset 0 0 60px rgba(255,255,255,0.6),
        0 0 100px #fff,
        0 0 180px currentColor,
        0 0 250px currentColor;
    }
  </style>
</head>
<body>

  <div class="esfera" id="bola"></div>

  <script>
    const bola = document.getElementById('bola');

    function getRandomColor() {
      const r = Math.floor(Math.random() * 256);
      const g = Math.floor(Math.random() * 256);
      const b = Math.floor(Math.random() * 256);
      return `rgb(${r}, ${g}, ${b})`;
    }

    bola.addEventListener('mouseenter', () => {
      const novaCor = getRandomColor();
      bola.style.background = `radial-gradient(
        circle at 30% 30%,
        #ffffff 0%,
        ${novaCor} 40%,
        ${escurecerCor(novaCor, 30)} 70%,
        #000000 100%
      )`;
      
      bola.style.boxShadow = `
        inset 0 0 50px rgba(255,255,255,0.4),
        0 0 60px ${novaCor},
        0 0 100px ${escurecerCor(novaCor, 40)},
        0 0 140px ${escurecerCor(novaCor, 60)}
      `;
    });

    // Função auxiliar para escurecer uma cor RGB
    function escurecerCor(cor, percent) {
      const [r, g, b] = cor.match(/\d+/g).map(Number);
      return `rgb(${Math.max(0, r * (1 - percent/100))},
                   ${Math.max(0, g * (1 - percent/100))},
                   ${Math.max(0, b * (1 - percent/100))})`;
    }
  </script>

</body>
</html>
